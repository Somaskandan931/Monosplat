project:
  name: "MonoSplat — Video to 3D Gaussian Splat"
  version: "2.0.0"
  mode: "object"   # object | scene | panoramic

data:
  raw_dir:            "data/raw"
  processed_dir:      "data/processed"
  colmap_output_dir:  "data/colmap_output"
  image_extensions:   [".jpg", ".jpeg", ".png"]
  video_fps:          null        # null = adaptive (duration-based)
  max_frames:         600

colmap:
  binary_path:    "colmap"
  quality:        "medium"        # low / medium / high
  camera_model:   "OPENCV"        # handles radial distortion well for phone video
  single_camera:  true
  use_original_resolution: true   # NEVER resize images before COLMAP
  image_width:    1280            # COLMAP runs at full input resolution
  image_height:   830

# ── Training ────────────────────────────────────────────────────────────────
training:
  output_dir:       "models/gaussian"
  checkpoint_dir:   "models/checkpoints"

  image_width:      960            # training-only resize — NEVER used for COLMAP
  image_height:     540
  enable_resize:    true           # set false to train at COLMAP resolution

  iterations:       15000
  iterations_cpu:   1000

  save_every:       5000
  eval_every:       1000

  # Cosine LR + warmup (v2 improvement over raw exp decay)
  # Position LR decays from 1.6e-4 → ~1.6e-6 over training.
  # Warmup ramps up from 0 over the first 300 iters — prevents early divergence.
  lr_warmup_iters: 300

  learning_rate:
    position:       0.00016
    feature:        0.0025
    opacity:        0.05
    scaling:        0.005
    rotation:       0.001

  # ── Densification schedule ────────────────────────────────────────────────
  densify_from_iter:        500
  densify_until_iter:       15000
  densification_interval:   50
  opacity_reset_interval:   3000

  # Adaptive densification: grad_threshold is auto-scaled by scene density.
  # Sparse cloud (<1k Gaussians) → threshold * 0.5 (more aggressive).
  # Dense cloud (>100k)         → threshold * 2.0 (conservative).
  percent_dense:              0.03
  densify_grad_threshold:     0.0001

  lambda_dssim:               0.2

  # ── Convergence monitoring (v2) ────────────────────────────────────────────
  # Detects plateau, instability, and over-pruning.
  convergence:
    window:         200     # rolling loss window
    patience:       5       # windows with < tol improvement → plateau
    tol:            0.0005  # minimum loss improvement to not count as plateau
    spike_tol:      0.15    # loss jump > 15% triggers instability warning
    safety_floor:   500     # Gaussian count below this → over-pruning warning

renderer:
  background_color: [1.0, 1.0, 1.0]   # white background
  sh_degree:        4
  max_gaussians:    250000
  batch_size:       5000               # software fallback chunk size

viewer:
  window_width:   800
  window_height:  800
  target_fps:     60
  fov_degrees:    60.0
  near_plane:     0.01
  far_plane:      100.0

output:
  renders_dir:    "outputs/renders"
  logs_dir:       "outputs/logs"
  videos_dir:     "outputs/videos"

cloud_storage:
  enabled: false
  type: "local"
  s3:
    bucket:  "monosplat-jobs"
    region:  "us-east-1"
  gcs:
    bucket:  "monosplat-jobs"
  local:
    path: "cloud_storage"

ai_layer:
  enabled: false
  detection_model:     "yolov8n.pt"
  segmentation_model:  "facebook/sam-vit-base"
  qa_model:            "gpt2"
  detection_confidence: 0.5