project:
  name: "MonoSplat — Object / Product / Architecture Mode"
  version: "2.0.0"
  mode: "object"   # object | scene | panoramic

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  colmap_output_dir: "data/colmap_output"
  image_extensions: [".jpg", ".jpeg", ".png"]
  video_fps: 5
  max_frames: 200

colmap:
  binary_path: "colmap"
  quality: "high"           # Use high for objects — more SIFT features needed
  camera_model: "OPENCV"
  single_camera: true

training:
  output_dir: "models/gaussian"
  checkpoint_dir: "models/checkpoints"
  # ── Matches 360GS defaults ──────────────────────────────────────
  iterations: 30000
  iterations_cpu: 1000
  save_every: 5000
  eval_every: 1000          # compute PSNR/SSIM on test set every N iters
  learning_rate:
    position: 0.00016
    feature: 0.0025
    opacity: 0.05
    scaling: 0.005
    rotation: 0.001
    position_final: 0.0000016   # exponential decay target (360GS uses 100x reduction)
  # ── Densification schedule (360GS: 500→15000, every 100 iters) ─
  densify_from_iter: 500
  densify_until_iter: 15000
  densification_interval: 100
  opacity_reset_interval: 3000
  # ── Object-mode specific ────────────────────────────────────────
  percent_dense: 0.01        # Gaussians larger than 1% of scene_extent get split
  densify_grad_threshold: 0.0002  # 360GS default (your code used 0.0001)
  lambda_dssim: 0.2          # weight of SSIM in combined loss (360GS default)

renderer:
  background_color: [1.0, 1.0, 1.0]  # White bg — better for object evaluation
  sh_degree: 3               # Full SH degree for objects (360GS uses 3)
  max_gaussians: 1000000     # 360GS allows up to 1M for detailed objects
  # CUDA rasterizer settings (used when diff-gaussian-rasterization is installed)
  use_cuda_rasterizer: true
  batch_size: 5000           # software fallback batch size

viewer:
  window_width: 800
  window_height: 600
  window_title: "MonoSplat Object Viewer"
  target_fps: 60
  fov_degrees: 45.0          # Tighter FOV for objects
  near_plane: 0.01
  far_plane: 100.0
  movement_speed: 0.05
  mouse_sensitivity: 0.003
  show_fps: true
  show_controls: true

output:
  renders_dir: "outputs/renders"
  logs_dir: "outputs/logs"
  videos_dir: "outputs/videos"