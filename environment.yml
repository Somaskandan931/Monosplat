name: monosplat
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.10.*

  # ── PyTorch with CUDA 11.8 ──────────────────────────────────────────────────
  # These three must be installed together from the pytorch channel.
  # Do NOT mix conda pytorch with pip torch — version drift causes silent
  # CUDA ABI mismatches that manifest as training crashes in gsplat.
  - pytorch=2.1.0
  - torchvision=0.16.0
  - pytorch-cuda=11.8

  # ── Numerical core ──────────────────────────────────────────────────────────
  - numpy=1.24.*
  - scipy=1.11.*

  # ── Image / Video ───────────────────────────────────────────────────────────
  - pillow=10.0.*
  - opencv=4.8.*           # includes python bindings (cv2)
  - imageio=2.31.*
  - ffmpeg=6.*             # system ffmpeg via conda — avoids PATH issues on Windows

  # ── Build tools (needed to compile gsplat CUDA extensions) ──────────────────
  - ninja=1.11.*
  - cmake=3.27.*

  # ── pip packages (not available on conda or version-locked) ─────────────────
  - pip
  - pip:
    # 3D Gaussian Splatting rasteriser
    # gsplat 1.3.0 is the last release that supports PyTorch 2.1 + CUDA 11.8
    # together. gsplat 1.4+ requires PyTorch 2.2+.
    - gsplat==1.3.0

    # PLY file I/O
    - plyfile==0.8.1

    # SSIM loss
    - pytorch-msssim==0.2.1

    # Perceptual loss (used in eval only, skip if OOM)
    - lpips==0.1.4

    # FastAPI web server
    - fastapi==0.104.1
    - uvicorn[standard]==0.24.0
    - python-multipart==0.0.6
    - aiofiles==23.2.1

    # Config
    - pyyaml==6.0.1

    # Async task queue
    - rq==1.16.0
    - redis==5.0.1

    # Quality metrics
    - tqdm==4.66.1

# ── Installation notes ────────────────────────────────────────────────────────
# 1. conda env create -f environment.yml
# 2. conda activate monosplat
# 3. Verify: python -c "import torch; print(torch.version.cuda)"  # should print 11.8
# 4. Verify: python -c "import gsplat; print(gsplat.__version__)"  # should print 1.3.0
#
# COLMAP must be installed separately:
#   Ubuntu: sudo apt install colmap
#   macOS:  brew install colmap
#   Windows: https://colmap.github.io/install.html (binaries available)
#
# If gsplat CUDA compilation fails during `pip install gsplat==1.3.0`:
#   export CUDA_HOME=/usr/local/cuda-11.8
#   export PATH=$CUDA_HOME/bin:$PATH
#   pip install gsplat==1.3.0 --no-build-isolation
