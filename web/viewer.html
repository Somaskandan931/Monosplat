<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonoSplat Viewer - Standalone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 24px;
      font-weight: 700;
      color: #00ff88;
      margin-bottom: 20px;
    }

    .loading-bar {
      width: 300px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ff88, #00b4ff);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .loading-text {
      font-size: 12px;
      color: #666;
      font-family: monospace;
    }

    .loading-stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #00ff88;
    }

    .stat-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Top toolbar */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .toolbar-badge {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(0, 255, 136, 0.15);
      color: #00ff88;
      border-radius: 4px;
      font-family: monospace;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      height: 32px;
      padding: 0 12px;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-color: #444;
    }

    .btn.primary {
      background: rgba(0, 255, 136, 0.15);
      color: #00ff88;
      border-color: rgba(0, 255, 136, 0.3);
    }

    .btn.primary:hover {
      background: rgba(0, 255, 136, 0.25);
    }

    /* Controls panel */
    #controls {
      position: fixed;
      left: 20px;
      top: 76px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      min-width: 200px;
    }

    .controls-header {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #00ff88;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
    }

    .control-key {
      color: #666;
    }

    .control-action {
      color: #ccc;
    }

    .control-divider {
      height: 1px;
      background: #1a1a1a;
      margin: 8px 0;
    }

    /* FPS counter */
    #fps {
      position: fixed;
      top: 64px;
      right: 20px;
      font-size: 12px;
      font-family: monospace;
      color: #666;
      z-index: 100;
    }

    /* Error message */
    #error {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 50, 50, 0.15);
      border: 1px solid rgba(255, 50, 50, 0.3);
      color: #ff6b6b;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 200;
      display: none;
      max-width: 90%;
    }

    /* File input area */
    #file-input-area {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #file-input-area.hidden {
      display: none;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 16px;
      padding: 60px 80px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      max-width: 500px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #00ff88;
      background: rgba(0, 255, 136, 0.05);
    }

    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .drop-zone-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }

    .drop-zone-subtitle {
      font-size: 14px;
      color: #666;
    }

    #file-input {
      display: none;
    }

    .url-input-area {
      margin-top: 24px;
      display: flex;
      gap: 8px;
    }

    .url-input {
      width: 300px;
      height: 40px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .url-input:focus {
      border-color: #00ff88;
    }
  </style>
</head>
<body>

<!-- File input overlay -->
<div id="file-input-area">
  <div class="drop-zone" id="drop-zone">
    <div class="drop-zone-icon">🎯</div>
    <div class="drop-zone-title">Drop .splat file here</div>
    <div class="drop-zone-subtitle">or click to browse • Also supports .ply files</div>
  </div>
  <input type="file" id="file-input" accept=".splat,.ply">
  <div class="url-input-area">
    <input type="text" class="url-input" id="url-input" placeholder="Or paste URL to .splat file...">
    <button class="btn primary" id="load-url-btn">Load</button>
  </div>
</div>

<!-- Loading screen -->
<div id="loading">
  <div class="loading-title">MonoSplat Viewer</div>
  <div class="loading-bar">
    <div class="loading-bar-fill" id="loading-bar"></div>
  </div>
  <div class="loading-text" id="loading-text">Loading...</div>
  <div class="loading-stats">
    <div class="stat">
      <div class="stat-value" id="stat-size">—</div>
      <div class="stat-label">File Size</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-splats">—</div>
      <div class="stat-label">Gaussians</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-time">—</div>
      <div class="stat-label">Load Time</div>
    </div>
  </div>
</div>

<!-- Toolbar -->
<div id="toolbar" style="display:none;">
  <div class="toolbar-left">
    <div class="toolbar-title" id="scene-title">Untitled Scene</div>
    <div class="toolbar-badge" id="splat-count">0 gaussians</div>
  </div>
  <div class="toolbar-right">
    <button class="btn" id="btn-reset" title="Reset Camera (R)">🔄 Reset</button>
    <button class="btn" id="btn-fullscreen" title="Fullscreen (F)">⛶ Fullscreen</button>
    <button class="btn primary" id="btn-new" title="Load New File">📂 Open</button>
  </div>
</div>

<!-- Controls panel -->
<div id="controls" style="display:none;">
  <div class="controls-header">Navigation</div>
  <div class="control-row">
    <span class="control-key">Left Drag</span>
    <span class="control-action">Orbit</span>
  </div>
  <div class="control-row">
    <span class="control-key">Right Drag</span>
    <span class="control-action">Pan</span>
  </div>
  <div class="control-row">
    <span class="control-key">Scroll</span>
    <span class="control-action">Zoom</span>
  </div>
  <div class="control-divider"></div>
  <div class="controls-header">Shortcuts</div>
  <div class="control-row">
    <span class="control-key">R</span>
    <span class="control-action">Reset Camera</span>
  </div>
  <div class="control-row">
    <span class="control-key">F</span>
    <span class="control-action">Fullscreen</span>
  </div>
  <div class="control-row">
    <span class="control-key">Space</span>
    <span class="control-action">Auto Rotate</span>
  </div>
</div>

<!-- FPS counter -->
<div id="fps" style="display:none;">0 FPS</div>

<!-- Error display -->
<div id="error"></div>

<!-- Canvas container -->
<div id="canvas-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════
// SPLAT FILE PARSER
// ═══════════════════════════════════════════════════════════════

const SPLAT_BYTES_PER_GAUSSIAN = 32;

function parseSplatFile(buffer) {
  const data = new Uint8Array(buffer);
  const numSplats = Math.floor(data.length / SPLAT_BYTES_PER_GAUSSIAN);
  
  console.log(`[Parser] Parsing ${numSplats} splats from ${data.length} bytes`);
  
  const positions = new Float32Array(numSplats * 3);
  const colors = new Float32Array(numSplats * 3);
  const scales = new Float32Array(numSplats * 3);
  const rotations = new Float32Array(numSplats * 4);
  const opacities = new Float32Array(numSplats);
  
  for (let i = 0; i < numSplats; i++) {
    const offset = i * SPLAT_BYTES_PER_GAUSSIAN;
    
    // Position (12 bytes: 3 x float32)
    const posView = new DataView(buffer, offset, 12);
    positions[i * 3] = posView.getFloat32(0, true);
    positions[i * 3 + 1] = posView.getFloat32(4, true);
    positions[i * 3 + 2] = posView.getFloat32(8, true);
    
    // Scale (12 bytes: 3 x float32)
    const scaleView = new DataView(buffer, offset + 12, 12);
    scales[i * 3] = scaleView.getFloat32(0, true);
    scales[i * 3 + 1] = scaleView.getFloat32(4, true);
    scales[i * 3 + 2] = scaleView.getFloat32(8, true);
    
    // RGBA (4 bytes: 4 x uint8)
    const r = data[offset + 24] / 255;
    const g = data[offset + 25] / 255;
    const b = data[offset + 26] / 255;
    const a = data[offset + 27] / 255;
    colors[i * 3] = r;
    colors[i * 3 + 1] = g;
    colors[i * 3 + 2] = b;
    opacities[i] = a;
    
    // Rotation (4 bytes: 4 x uint8, decoded as (byte - 128) / 128)
    rotations[i * 4] = (data[offset + 28] - 128) / 128;
    rotations[i * 4 + 1] = (data[offset + 29] - 128) / 128;
    rotations[i * 4 + 2] = (data[offset + 30] - 128) / 128;
    rotations[i * 4 + 3] = (data[offset + 31] - 128) / 128;
  }
  
  return { positions, colors, scales, rotations, opacities, count: numSplats };
}

// ═══════════════════════════════════════════════════════════════
// GAUSSIAN SPLAT RENDERER
// ═══════════════════════════════════════════════════════════════

class GaussianSplatRenderer {
  constructor(container) {
    this.container = container;
    this.scene = null;
    this.camera = null;
    this.renderer = null;
    this.controls = null;
    this.splats = null;
    this.autoRotate = false;
    
    this.init();
  }
  
  init() {
    // Scene
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x0a0a0a);
    
    // Camera
    const aspect = window.innerWidth / window.innerHeight;
    this.camera = new THREE.PerspectiveCamera(60, aspect, 0.01, 1000);
    this.camera.position.set(0, 0, 5);
    
    // Renderer
    this.renderer = new THREE.WebGLRenderer({ 
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.container.appendChild(this.renderer.domElement);
    
    // Controls
    this.controls = new OrbitControls(this.camera, this.renderer.domElement);
    this.controls.enableDamping = true;
    this.controls.dampingFactor = 0.05;
    this.controls.minDistance = 0.1;
    this.controls.maxDistance = 100;
    
    // Resize handler
    window.addEventListener('resize', () => this.onResize());
    
    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => this.onKey(e));
    
    // Start render loop
    this.animate();
  }
  
  onResize() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    this.camera.aspect = width / height;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(width, height);
  }
  
  onKey(e) {
    switch(e.key.toLowerCase()) {
      case 'r':
        this.resetCamera();
        break;
      case 'f':
        this.toggleFullscreen();
        break;
      case ' ':
        e.preventDefault();
        this.autoRotate = !this.autoRotate;
        this.controls.autoRotate = this.autoRotate;
        break;
    }
  }
  
  resetCamera() {
    if (!this.splats) return;
    const bounds = this.splats.bounds;
    this.camera.position.set(
      bounds.center[0],
      bounds.center[1] - bounds.radius * 1.5,
      bounds.center[2] + bounds.radius * 2.5
    );
    this.controls.target.set(...bounds.center);
    this.controls.update();
  }
  
  toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
  
  // Create a simple point cloud visualization of the splats
  // (Full Gaussian splat rendering requires custom shaders)
  renderSplats(splatData) {
    // Remove old splats
    if (this.splats) {
      this.scene.remove(this.splats.points);
      this.splats.points.geometry.dispose();
      this.splats.points.material.dispose();
    }
    
    const { positions, colors, opacities, count } = splatData;
    
    // Compute bounds
    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;
    let minZ = Infinity, maxZ = -Infinity;
    
    for (let i = 0; i < count; i++) {
      const x = positions[i * 3];
      const y = positions[i * 3 + 1];
      const z = positions[i * 3 + 2];
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
      if (z < minZ) minZ = z;
      if (z > maxZ) maxZ = z;
    }
    
    const center = [
      (minX + maxX) / 2,
      (minY + maxY) / 2,
      (minZ + maxZ) / 2
    ];
    const radius = Math.max(
      maxX - minX,
      maxY - minY,
      maxZ - minZ
    ) / 2 || 1;
    
    // Create geometry
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('opacity', new THREE.BufferAttribute(opacities, 1));
    
    // Create material
    const material = new THREE.PointsMaterial({
      size: radius * 0.02,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      sizeAttenuation: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    
    // Create points
    const points = new THREE.Points(geometry, material);
    this.scene.add(points);
    
    // Store splat info
    this.splats = { points, count, bounds: { center, radius } };
    
    // Adjust camera
    this.camera.position.set(
      center[0],
      center[1] - radius * 1.5,
      center[2] + radius * 2.5
    );
    this.controls.target.set(...center);
    this.controls.update();
    
    return { center, radius, count };
  }
  
  animate() {
    requestAnimationFrame(() => this.animate());
    this.controls.update();
    this.renderer.render(this.scene, this.camera);
  }
}

// ═══════════════════════════════════════════════════════════════
// MAIN APPLICATION
// ═══════════════════════════════════════════════════════════════

const container = document.getElementById('canvas-container');
const renderer = new GaussianSplatRenderer(container);

// UI Elements
const fileInputArea = document.getElementById('file-input-area');
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const urlInput = document.getElementById('url-input');
const loadUrlBtn = document.getElementById('load-url-btn');
const loading = document.getElementById('loading');
const loadingBar = document.getElementById('loading-bar');
const loadingText = document.getElementById('loading-text');
const statSize = document.getElementById('stat-size');
const statSplats = document.getElementById('stat-splats');
const statTime = document.getElementById('stat-time');
const toolbar = document.getElementById('toolbar');
const controls = document.getElementById('controls');
const fpsDisplay = document.getElementById('fps');
const errorDisplay = document.getElementById('error');
const sceneTitle = document.getElementById('scene-title');
const splatCount = document.getElementById('splat-count');

let loadStartTime = 0;

function setLoading(percent, text) {
  loadingBar.style.width = percent + '%';
  loadingText.textContent = text;
}

function showError(msg) {
  errorDisplay.textContent = msg;
  errorDisplay.style.display = 'block';
  setTimeout(() => {
    errorDisplay.style.display = 'none';
  }, 5000);
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function loadSplatFile(fileOrUrl, fileName = 'scene') {
  loadStartTime = Date.now();
  fileInputArea.classList.add('hidden');
  setLoading(5, 'Loading file...');
  loading.classList.remove('hidden');
  
  try {
    let buffer;
    let fileSize;
    
    if (typeof fileOrUrl === 'string') {
      // Load from URL
      setLoading(5, `Fetching from URL...`);
      const response = await fetch(fileOrUrl);
      if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      fileSize = parseInt(response.headers.get('content-length') || '0');
      buffer = await response.arrayBuffer();
    } else {
      // Load from File object
      fileSize = fileOrUrl.size;
      buffer = await fileOrUrl.arrayBuffer();
    }
    
    statSize.textContent = formatBytes(fileSize);
    setLoading(20, `Parsing ${formatBytes(fileSize)}...`);
    
    // Parse the splat file
    const splatData = parseSplatFile(buffer);
    
    statSplats.textContent = splatData.count.toLocaleString();
    setLoading(60, `Creating ${splatData.count.toLocaleString()} gaussians...`);
    
    // Render the splats
    const bounds = renderer.renderSplats(splatData);
    
    const elapsed = ((Date.now() - loadStartTime) / 1000).toFixed(1);
    statTime.textContent = elapsed + 's';
    
    setLoading(100, 'Ready!');
    
    // Update UI
    sceneTitle.textContent = fileName;
    splatCount.textContent = `${splatData.count.toLocaleString()} gaussians`;
    
    setTimeout(() => {
      loading.classList.add('hidden');
      toolbar.style.display = 'flex';
      controls.style.display = 'block';
      fpsDisplay.style.display = 'block';
    }, 500);
    
    // Start FPS counter
    startFpsCounter();
    
    console.log(`[Viewer] Loaded ${splatData.count} splats in ${elapsed}s`);
    
  } catch (err) {
    console.error('[Viewer] Error:', err);
    showError(`Failed to load splat: ${err.message}`);
    setLoading(0, 'Error - ' + err.message);
    fileInputArea.classList.remove('hidden');
  }
}

function startFpsCounter() {
  let frames = 0;
  let lastTime = performance.now();
  
  function count() {
    frames++;
    const now = performance.now();
    if (now - lastTime >= 1000) {
      fpsDisplay.textContent = frames + ' FPS';
      frames = 0;
      lastTime = now;
    }
    requestAnimationFrame(count);
  }
  count();
}

// Event listeners
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  
  const file = e.dataTransfer.files[0];
  if (file) {
    loadSplatFile(file, file.name);
  }
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    loadSplatFile(file, file.name);
  }
});

loadUrlBtn.addEventListener('click', () => {
  const url = urlInput.value.trim();
  if (url) {
    loadSplatFile(url, url.split('/').pop() || 'scene');
  }
});

urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    loadUrlBtn.click();
  }
});

document.getElementById('btn-reset').addEventListener('click', () => renderer.resetCamera());
document.getElementById('btn-fullscreen').addEventListener('click', () => renderer.toggleFullscreen());
document.getElementById('btn-new').addEventListener('click', () => {
  fileInputArea.classList.remove('hidden');
  toolbar.style.display = 'none';
  controls.style.display = 'none';
  fpsDisplay.style.display = 'none';
});

// Check for URL parameter
const urlParams = new URLSearchParams(window.location.search);
const splatUrl = urlParams.get('url');
if (splatUrl) {
  urlInput.value = splatUrl;
  loadSplatFile(splatUrl, 'Remote Scene');
}
</script>
</body>
</html>
