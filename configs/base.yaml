training:
  iterations: 30000
  densify_from_iter: 500
  densify_until_iter: 15000
  densification_interval: 200
  densify_grad_threshold: 0.0003
  max_gaussians: 150000
  opacity_reset_interval: 1000
  lambda_opacity_reg: 0.001
  lambda_dssim: 0.2
  lambda_lpips: 0.05
  percent_dense: 0.01
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001
  save_iterations: [1000, 5000, 10000, 20000, 30000]
  checkpoint_iterations: [1000, 5000, 10000, 20000, 30000]
  test_iterations: [5000, 10000, 20000, 30000]

model:
  sh_degree: 3

renderer:
  max_gaussians: 150000

pipeline:
  convert_SHs_python: false
  compute_cov3D_python: false
  debug: false

data:
  max_frames: 300
  image_width: 0
  image_height: 0

colmap:
  quality: medium
  binary_path: colmap
  camera_model: OPENCV
  single_camera: true

runtime:
  auto_profile: true
  auto_resume: true
  cache_cleanup_interval: 500
  drive_persistence: true
  drive_root: /content/drive/MyDrive/MonoSplat
